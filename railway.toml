[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "python run.py"
healthcheckPath = "/health"
# Seconds Railway waits for /health to succeed after container start.
# Cold start includes MCP widget registration + DB readiness retries (~90-120s
# worst case) before the process accepts traffic.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
ENVIRONMENT = "production"
DEBUG = "false"
SERVERLESS_ENABLED = "true"
PUBLIC_BASE_URL = "https://api.360ghar.com"
