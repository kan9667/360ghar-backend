name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff
        run: uv run ruff check app/ --output-format=github

      - name: Run mypy
        run: uv run mypy app/ --ignore-missing-imports --no-error-summary

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shards balanced by test count (~513 each, total 2051)
          - shard: 0
            name: mcp
            paths: "tests/unit/mcp tests/mcp tests/unit/test_mcp_utils.py tests/unit/app"
          - shard: 1
            name: services
            paths: "tests/unit/services tests/unit/api tests/unit/repositories tests/blog"
          - shard: 2
            name: integration
            paths: "tests/api tests/pm tests/integration tests/e2e tests/unit/utils tests/flatmates"
          - shard: 3
            name: core-models
            paths: "tests/unit/core tests/unit/models tests/unit/schemas tests/middleware"
    name: Test (shard ${{ matrix.shard }} - ${{ matrix.name }})

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      # ── Docker build (cached across runs via GHA cache) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test database image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .github/Dockerfile.test-db
          tags: test-postgres
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── PostgreSQL ───────────────────────────────────────────────────────
      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name test-postgres \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_password \
            -e POSTGRES_DB=test_db \
            -p 5432:5432 \
            test-postgres

          # Wait for PostgreSQL (pg_isready is inside the container)
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec test-postgres pg_isready -U test_user; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "ERROR: PostgreSQL failed to become ready"
          docker logs test-postgres
          exit 1

      - name: Setup PostgreSQL extensions
        run: |
          failed=0
          for ext in vector postgis; do
            ok=0
            for i in {1..5}; do
              if docker exec test-postgres psql -U test_user -d test_db -c "CREATE EXTENSION IF NOT EXISTS $ext;"; then
                echo "Extension $ext created"
                ok=1
                break
              fi
              echo "Retry $i/5 for $ext..."
              sleep 2
            done
            if [ "$ok" -eq 0 ]; then
              echo "ERROR: Failed to create extension $ext after 5 retries"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          docker exec test-postgres psql -U test_user -d test_db -c \
            "SELECT extname FROM pg_extension WHERE extname IN ('vector', 'postgis');"

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      # ── Tests ────────────────────────────────────────────────────────────
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          ASYNC_DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_PUBLISHABLE_KEY: mock_key_for_testing
          SUPABASE_SECRET_KEY: mock_secret_key_for_testing
          SENTRY_DSN: ""
          ENVIRONMENT: test
          CI: "true"
          COVERAGE_FILE: .coverage.${{ matrix.shard }}
        run: |
          uv run pytest ${{ matrix.paths }} \
            --ignore=tests/unit/core/test_docs_contracts.py \
            -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-data-${{ matrix.shard }}
          path: .coverage.${{ matrix.shard }}
          retention-days: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          file: ./coverage.xml
          flags: shard-${{ matrix.shard }}
          fail_ci_if_error: false
          verbose: true

  coverage-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Download all coverage data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and enforce threshold
        run: |
          uv run coverage combine .coverage.*
          uv run coverage report --fail-under=90
          uv run coverage xml -o coverage-combined.xml

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          file: ./coverage-combined.xml
          fail_ci_if_error: false
