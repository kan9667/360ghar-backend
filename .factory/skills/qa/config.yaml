project: 360Ghar
imagemagick: true
environments:
  local_dev:
    url: http://localhost:8000
    restrictions: []
  production:
    url: https://api.360ghar.com
    restrictions: []

default_target: local_dev

auth:
  method: bearer-token
  provider: supabase

personas:
  - name: guest
    description: 'Unauthenticated user browsing public endpoints'
    email: null
    credentials_source: none
    test_focus:
      - public property search
      - public amenities listing
      - vastu analysis (public)
      - data hub public queries
      - MCP guest tools
    cannot_do:
      - create properties
      - schedule visits
      - make bookings
      - access owner/tenant/agent endpoints
      - access admin MCP tools

  - name: user
    description: 'Regular authenticated user - property seeker, tenant, or owner'
    email: QA_USER_EMAIL
    credentials_source: env-var
    secret_name: QA_USER_TOKEN
    test_focus:
      - property discovery and swipes
      - visit scheduling
      - short-stay bookings
      - flatmates discovery
      - vastu analysis
      - owner property management
      - tenant lease/rent/maintenance
      - MCP user tools
    cannot_do:
      - verify/approve properties (agent only)
      - access admin endpoints
      - access admin MCP tools
      - manage other users' properties

  - name: agent
    description: 'Real estate agent with property verification and management capabilities'
    email: QA_AGENT_EMAIL
    credentials_source: env-var
    secret_name: QA_AGENT_TOKEN
    test_focus:
      - property verification
      - lease management
      - rent collection
      - maintenance oversight
      - booking management
      - agent dashboard
      - MCP admin tools (agent_*)
    cannot_do:
      - access admin-only endpoints
      - manage platform settings

  - name: admin
    description: 'Platform administrator with full system access'
    email: QA_ADMIN_EMAIL
    credentials_source: env-var
    secret_name: QA_ADMIN_TOKEN
    test_focus:
      - system status
      - user management
      - all agent capabilities
      - MCP admin tools (admin_*)
      - platform configuration
    cannot_do: []

  - name: new_user
    description: 'Fresh signup via Supabase, no existing data'
    email_pattern: 'qa+signup_{RUN_ID}@360ghar.com'
    test_focus:
      - registration flow
      - empty states
      - first property search
      - onboarding

apps:
  backend:
    path_patterns:
      - 'app/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'run.py'
    skill: qa-backend
    test_tool: curl
    build_command: null

feature_flags:
  provider: none
  dashboard_url: null
  how_to_override: null

integrations:
  ai:
    provider: multi
    providers:
      - google-gemini
      - zhipuai-glm
      - perplexity
    credentials: dev_env_keys
  email:
    provider: generic-smtp
    credentials: dev_env_keys
  sms:
    provider: generic
    credentials: dev_env_keys
  auth:
    provider: supabase
    credentials: dev_env_keys
  storage:
    provider: supabase-storage
    credentials: dev_env_keys

cleanup:
  auto_cleanup: true
  strategy: api-call
  instructions: |
    Delete test data via API endpoints:
    - DELETE /api/v1/properties/{id} (owner endpoint)
    - PUT /api/v1/visits/{id}/cancel for visits
    - PUT /api/v1/bookings/{id}/cancel for bookings
    - Use Supabase admin API to clean up test users if needed

failure_learning: suggest_in_report
